<!DOCTYPE html>
<html>
    <head>
        <title>Formulário</title>
        <style>
            body {
                margin: 0;
                font-family: Arial, sans-serif;
                display: flex;
                flex-direction: column;
                height: 100vh;
        }

            main {
                display: flex;
                flex: 1;
        }
            .esquerda {
                width: 50%;
                display: flex;
                justify-content: center;
                align-items: center;
        }
            .direita {
                width: 50%;
                background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),url('https://picsum.photos/800/800');
                background-size: cover;
                background-position: center;

        }
            form {
                display: flex;
                flex-direction: column;
                gap: 10px;
        }

            header {
                text-align: center;
                padding: 1px;
                background: #222;
                color: white;
        }

        </style>
    </head>
    <body>
        <header>
            <h1>Qual é o seu personagem favorito?</h1>
        </header>

        <main>
            <div class="esquerda">
                <form method="get">
                    <h3>Quem é você?</h3>

                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" name="nome">

                    <label for="sobrenome">Sobrenome:</label>
                    <input type="text" id="sobrenome" name="sobrenome">

                    <h2>Qual seu personagem favorito?</h2>

                    <label><input type="radio" name="personagem" value="arthur"> Arthur Morgan</label>
                    <label><input type="radio" name="personagem" value="leon"> Leon S. Kennedy</label>
                    <label><input type="radio" name="personagem" value="joel"> Joel Miller</label>
                    <label><input type="radio" name="personagem" value="kratos"> Kratos</label>

                    <input type="submit" value="Enviar">
                </form>
            </div>

            <div class="direita"></div>

        </main>
        <footer>
            <p>&copy; 3000a.c Formulário. Todos os direitos reservados ao Jacinto Pinto.</p>
        </footer>
    </body>
</html>
