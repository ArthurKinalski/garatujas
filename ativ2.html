<!DOCTYPE html>
<html>
    <head>
        <title>Formulário</title>
        <style>
            body {
                margin: 0;
                font-family: Arial, sans-serif;
                display: flex;
                flex-direction: column;
                height: 100vh;
        }

            main {
                display: flex;
                flex: 1;
                background: #333;
                color: white;
        }
            .esquerda {
                width: 50%;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 20px;
        }
            .direita {
                width: 50%;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
                padding: 20px;
                background: #111;
        }
            .direita img {
                width: 100%;
                border-radius: 10px;
        }
            .direita img:hover {
                transform: scale(1.05);
                transition: 0.2s;
                cursor: pointer;
        }        
            form {
                display: flex;
                flex-direction: column;
                gap: 10px;
                width: 450px;
                padding: 20px;
                background: #2a2a2a;
                border-radius: 12px;
                box-shadow: 0 0 20px rgba(0,0,0,0.5);
                border: 1px solid #3a3a3a;
        }
            * {
                box-sizing: border-box;
        }

            header {
                text-align: center;
                padding: 8px;
                background: #222;
                color: white;
                margin: 0;
        }
            strong {
                color: #fd9d5d;
                font-family: "Courier New", monospace;
                letter-spacing: 2px;
                text-shadow: 0 0 5px rgba(253, 157, 93, 0.5);
        }
            footer {
                text-align: center;
                padding: 8px;
                background: #222;
                color: white;
                margin: 0;
        }
            footer p {
                margin: 0;
        }
            input[type="text"] {
                width: 100%;
                padding: 10px;
                border: 1px solid #444;
                border-radius: 10px;
                background: #1f1f1f;
                color: white;
        }

            input[type="submit"] {
                padding: 10px;
                background: #fd9d5d;
                color: white;
                border: none;
                cursor: pointer;
                border-radius: 8px;
                transition: 0.2s;
        }
            input[type="submit"]:active {
                transform: scale(0.98);
        }
            label {
                margin-bottom: 5px;
        }
            label:hover {
                color: #fd9d5d;
                cursor: pointer;
        }
            input[type="radio"] {
                margin-right: 5px;
        }
            input[type="submit"]:hover {
                background: #d3702e;
        }
            h1 {
                font-size: 30px;
                margin: 10px 0;
        }

            h2 {
                font-size: 24px;
                margin-top: 15px;
        }

        </style>
    </head>
    <body>
        <header>
            <h1>Qual é o seu <strong>PERSONAGEM FAVORITO</strong>?</h1>
        </header>

        <main>
            <div class="esquerda">
                <form method="get">
                    <h2>Quem é você?</h2>

                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" name="nome">

                    <label for="sobrenome">Sobrenome:</label>
                    <input type="text" id="sobrenome" name="sobrenome">

                    <h2>Qual seu personagem favorito?</h2>

                    <label><input type="radio" name="personagem" value="arthur"> Arthur Morgan</label>
                    <label><input type="radio" name="personagem" value="leon"> Leon S. Kennedy</label>
                    <label><input type="radio" name="personagem" value="joel"> Joel Miller</label>
                    <label><input type="radio" name="personagem" value="kratos"> Kratos</label>

                    <input type="submit" value="Enviar">
                </form>
            </div>

            <div class="direita">
                <img src="image-arthur.png" alt="Arthur Morgan">
                <img src="image-leon.png" alt="Leon S. Kennedy">
                <img src="image-joel.png" alt="Joel Miller">
                <img src="image-kratos.png" alt="Kratos">
            </div>

        </main>
        <footer>
            <p>&copy; 3000a.c Formulário. Todos os direitos reservados ao Jacinto Pinto.</p>
        </footer>
    </body>
</html>
