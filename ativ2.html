<!DOCTYPE html>
<html>
    <head>
        <title>Formulário</title>
        <style>
            main {
                font-family: "Courier New", monospace;
            }
            header {
                text-align: center;
                background-color: aqua;
                border-radius: 50px;
                font: Arial;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>Qual é o seu personagem favorito?</h1>
        </header>

    <main>
        <form method="get">
            <h3>Quem é você?</h3>
            <div>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome">
            </div>
            <div>
                <label for="sobrenome">Sobrenome:</label>
                <input type="text" id="sobrenome" name="sobrenome">
            </div>

                <h2>Qual seu personagem favorito?</h2>

                <input type="radio" id="arthur" value="arthur" name="personagem">
                <label for="arthur">Arthur Morgan</label>

                <input type="radio" id="leon" value="leon" name="personagem">
                <label for="leon">Leon S. Kennedy</label>

                <input type="radio" id="joel" value="joel" name="personagem">
                <label for="joel">Joel Miller</label>

                <input type="radio" id="kratos" value="kratos" name="personagem">
                <label for="kratos">Kratos</label>

            <div>
                <input type="submit" value="Enviar">
            </div>
        </form>
    </main>
    </body>
</html>
