<!DOCTYPE html>
<html>
    <head>
        <title>Formulário</title>
    </head>
    <body>

        <h1>Qual seu personagem favorito?</h1>

        <form method="get">
            <h3>Quem é você?</h3>
            <div>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome">
            </div>
            <div>
                <label for="sobrenome">Sobrenome:</label>
                <input type="text" id="sobrenome" name="sobrenome">
            </div>

            <h2>Qual seu personagem favorito?</h2>

            <input type="radio" name="Arthur Morgan">Arthur Morgan
            <input type="radio" name="Leon S. Kennedy">Leon S. Kennedy
            <input type="radio" name="Joel Miller">Joel Miller
            <input type="radio" name="Kratos">Kratos

            <div>
                <input type="submit" value="Enviar">
            </div>
        </form>
    </body>
</html>
